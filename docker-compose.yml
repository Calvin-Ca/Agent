version: "3.9"

# 先启动基础设施
# 启动: docker compose up -d
# 停止: docker compose down
#
# 服务一览:
#   MySQL     : localhost:3307
#   Redis     : localhost:6379
#   Milvus    : localhost:19530
#   MinIO     : localhost:9000  (API) / localhost:9001 (Console)
#   Attu      : localhost:8088  (Milvus Web UI)

services:

  # ── MySQL 8.0 ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: agent-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_123
      MYSQL_DATABASE: caic
      MYSQL_USER: caic
      MYSQL_PASSWORD: caic
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Milvus 依赖：etcd + MinIO ───────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: agent-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd

  minio-storage:
    image: minio/minio:latest
    container_name: agent-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Milvus Standalone ──────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: agent-milvus
    restart: unless-stopped
    command: milvus run standalone
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio-storage
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio-storage:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Attu — Milvus 可视化管理界面 ───────────────────────────
  milvus-attu:
    image: zilliz/attu:v2.4
    container_name: agent-milvus-attu
    restart: unless-stopped
    ports:
      - "8088:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
